version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cyberpay-postgres
    environment:
      POSTGRES_USER: cyberpay
      POSTGRES_PASSWORD: cyberpay_secret
      POSTGRES_DB: cyberpay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cyberpay-redis
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
